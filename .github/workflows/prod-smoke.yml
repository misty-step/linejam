name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: Production Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_BASE_URL: https://www.linejam.app
      PLAYWRIGHT_REQUIRE_AUTH_SMOKE: '1'
      LINEJAM_SMOKE_RUNNER: playwright
      LINEJAM_ENFORCE_SMOKE_URL_ALLOWLIST: '1'
      LINEJAM_ALLOWED_SMOKE_ORIGINS: https://www.linejam.app
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      PLAYWRIGHT_CLERK_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_CLERK_TEST_EMAIL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run production smoke
        run: |
          mkdir -p "$RUNNER_TEMP/linejam-smoke"
          set +e
          pnpm canary:smoke > "$RUNNER_TEMP/linejam-smoke/stdout.log" 2> "$RUNNER_TEMP/linejam-smoke/stderr.log"
          code=$?
          cat "$RUNNER_TEMP/linejam-smoke/stdout.log"
          cat "$RUNNER_TEMP/linejam-smoke/stderr.log" >&2
          exit "$code"

      - name: Upload production smoke logs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: production-smoke-logs
          path: ${{ runner.temp }}/linejam-smoke/
          retention-days: 14

      - name: Upload production Playwright artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: production-smoke-playwright
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14
