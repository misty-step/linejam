name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release with Landmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Landmark
        # Pinned to the v1 tag's commit — this action holds GH_RELEASE_TOKEN
        # (repo write: pushes the release commit + tags), so a floating tag is
        # not acceptable here. Bump deliberately when upgrading Landmark.
        uses: misty-step/landmark@1379e56f007de6a2b34993e12e5f1d8931f7c157 # v1
        with:
          mode: full
          node-version: 22
          healthcheck: 'true'
          github-token: ${{ secrets.GH_RELEASE_TOKEN }}
          llm-api-key: ${{ secrets.OPENROUTER_API_KEY }}
