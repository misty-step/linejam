name: CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
      - '.gitignore'
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_JWT_ISSUER_DOMAIN: ${{ secrets.CLERK_JWT_ISSUER_DOMAIN }}
      CANARY_ENDPOINT: ${{ secrets.CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CANARY_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set NEXT_PUBLIC_CONVEX_URL fallback
        run: |
          if [ -z "$NEXT_PUBLIC_CONVEX_URL" ]; then
            echo "NEXT_PUBLIC_CONVEX_URL=http://localhost:8187" >> "$GITHUB_ENV"
          fi

      - name: Install Dagger CLI
        run: |
          curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Format check
        run: ./scripts/ci/dagger-call.sh format-check

      - name: Lint
        run: ./scripts/ci/dagger-call.sh lint

      - name: Type check
        run: ./scripts/ci/dagger-call.sh typecheck

      - name: Secret scan
        run: ./scripts/ci/dagger-call.sh secret-scan

      - name: Security audit
        run: ./scripts/ci/dagger-call.sh audit

  test-build:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality-gates]
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_JWT_ISSUER_DOMAIN: ${{ secrets.CLERK_JWT_ISSUER_DOMAIN }}
      PLAYWRIGHT_CLERK_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_CLERK_TEST_EMAIL }}
      PLAYWRIGHT_REQUIRE_AUTH_E2E: '1'
      GUEST_TOKEN_SECRET: ${{ secrets.GUEST_TOKEN_SECRET }}
      CANARY_ENDPOINT: ${{ secrets.CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CANARY_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set NEXT_PUBLIC_CONVEX_URL fallback
        run: |
          if [ -z "$NEXT_PUBLIC_CONVEX_URL" ]; then
            echo "NEXT_PUBLIC_CONVEX_URL=http://localhost:8187" >> "$GITHUB_ENV"
          fi

      - name: Install Dagger CLI
        run: |
          curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Unit tests
        run: ./scripts/ci/dagger-call.sh unit-test

      - name: Build check
        run: ./scripts/ci/dagger-call.sh build-check

  e2e:
    name: E2E Mirror
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [quality-gates]
    if: |
      github.event_name == 'push' ||
      github.event.pull_request.draft == false
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_JWT_ISSUER_DOMAIN: ${{ secrets.CLERK_JWT_ISSUER_DOMAIN }}
      PLAYWRIGHT_CLERK_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_CLERK_TEST_EMAIL }}
      PLAYWRIGHT_REQUIRE_AUTH_E2E: '1'
      LINEJAM_SYNC_CONVEX_BEFORE_DAGGER: '0'
      GUEST_TOKEN_SECRET: ${{ secrets.GUEST_TOKEN_SECRET }}
      CANARY_ENDPOINT: ${{ secrets.CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CANARY_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set NEXT_PUBLIC_CONVEX_URL fallback
        run: |
          if [ -z "$NEXT_PUBLIC_CONVEX_URL" ]; then
            echo "NEXT_PUBLIC_CONVEX_URL=http://localhost:8187" >> "$GITHUB_ENV"
          fi

      - name: Install Dagger CLI
        run: |
          curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run E2E mirror
        run: ./scripts/ci/dagger-call.sh e2e

  merge-gate:
    name: merge-gate
    runs-on: ubuntu-latest
    needs: [quality-gates, test-build, e2e]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
