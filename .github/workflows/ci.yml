name: CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
      - '.gitignore'
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CI_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_JWT_ISSUER_DOMAIN: ${{ secrets.CI_CLERK_JWT_ISSUER_DOMAIN || secrets.CLERK_JWT_ISSUER_DOMAIN }}
      CANARY_ENDPOINT: ${{ secrets.CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CANARY_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set NEXT_PUBLIC_CONVEX_URL fallback
        run: |
          if [ -z "$NEXT_PUBLIC_CONVEX_URL" ]; then
            echo "NEXT_PUBLIC_CONVEX_URL=http://localhost:8187" >> "$GITHUB_ENV"
          fi

      - name: Install Dagger CLI
        run: |
          curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Format check
        run: ./scripts/ci/dagger-call.sh format-check

      - name: Lint
        run: ./scripts/ci/dagger-call.sh lint

      - name: Type check
        run: ./scripts/ci/dagger-call.sh typecheck

      - name: Secret scan
        run: ./scripts/ci/dagger-call.sh secret-scan

      - name: Security audit
        run: ./scripts/ci/dagger-call.sh audit

  test-build:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality-gates]
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CI_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CI_CLERK_SECRET_KEY || secrets.CLERK_SECRET_KEY }}
      CLERK_JWT_ISSUER_DOMAIN: ${{ secrets.CI_CLERK_JWT_ISSUER_DOMAIN || secrets.CLERK_JWT_ISSUER_DOMAIN }}
      PLAYWRIGHT_CLERK_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_CLERK_TEST_EMAIL }}
      PLAYWRIGHT_REQUIRE_AUTH_E2E: '1'
      GUEST_TOKEN_SECRET: ${{ secrets.GUEST_TOKEN_SECRET }}
      CANARY_ENDPOINT: ${{ secrets.CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CANARY_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set NEXT_PUBLIC_CONVEX_URL fallback
        run: |
          if [ -z "$NEXT_PUBLIC_CONVEX_URL" ]; then
            echo "NEXT_PUBLIC_CONVEX_URL=http://localhost:8187" >> "$GITHUB_ENV"
          fi

      - name: Install Dagger CLI
        run: |
          curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Unit tests
        run: ./scripts/ci/dagger-call.sh unit-test

      - name: Build check
        run: ./scripts/ci/dagger-call.sh build-check

  e2e:
    name: E2E Mirror
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [quality-gates]
    if: |
      github.event_name == 'push' ||
      github.event.pull_request.draft == false
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CI_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CI_CLERK_SECRET_KEY || secrets.CLERK_SECRET_KEY }}
      CLERK_JWT_ISSUER_DOMAIN: ${{ secrets.CI_CLERK_JWT_ISSUER_DOMAIN || secrets.CLERK_JWT_ISSUER_DOMAIN }}
      PLAYWRIGHT_CLERK_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_CLERK_TEST_EMAIL }}
      PLAYWRIGHT_REQUIRE_AUTH_E2E: '1'
      LINEJAM_SYNC_CONVEX_BEFORE_DAGGER: '0'
      GUEST_TOKEN_SECRET: ${{ secrets.GUEST_TOKEN_SECRET }}
      CANARY_ENDPOINT: ${{ secrets.CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CANARY_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set NEXT_PUBLIC_CONVEX_URL fallback
        run: |
          if [ -z "$NEXT_PUBLIC_CONVEX_URL" ]; then
            echo "NEXT_PUBLIC_CONVEX_URL=http://localhost:8187" >> "$GITHUB_ENV"
          fi

      - name: Install Dagger CLI
        run: |
          curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run E2E mirror
        run: ./scripts/ci/dagger-call.sh e2e

  # Artifact capture is part of PR readiness: runtime errors, missing evidence
  # files, and unwaived packaging failures fail before merge-gate.
  qa-evidence:
    name: QA Evidence
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality-gates]
    if: |
      github.event_name == 'push' ||
      github.event.pull_request.draft == false
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CI_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CI_CLERK_SECRET_KEY || secrets.CLERK_SECRET_KEY }}
      CLERK_JWT_ISSUER_DOMAIN: ${{ secrets.CI_CLERK_JWT_ISSUER_DOMAIN || secrets.CLERK_JWT_ISSUER_DOMAIN }}
      GUEST_TOKEN_SECRET: ${{ secrets.GUEST_TOKEN_SECRET }}
      CANARY_ENDPOINT: ${{ secrets.CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CANARY_ENDPOINT }}
      NEXT_PUBLIC_CANARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CANARY_API_KEY }}
      LINEJAM_BASE_URL: http://127.0.0.1:3333
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set NEXT_PUBLIC_CONVEX_URL fallback
        run: |
          if [ -z "$NEXT_PUBLIC_CONVEX_URL" ]; then
            echo "NEXT_PUBLIC_CONVEX_URL=http://localhost:8187" >> "$GITHUB_ENV"
          fi

      - name: Set QA evidence paths
        run: |
          echo "LINEJAM_EVIDENCE_DIR=$RUNNER_TEMP/linejam-evidence" >> "$GITHUB_ENV"
          echo "LINEJAM_EVIDENCE_SERVER_LOG=$RUNNER_TEMP/linejam-evidence-server.log" >> "$GITHUB_ENV"
          echo "LINEJAM_EVIDENCE_SERVER_PID=$RUNNER_TEMP/linejam-evidence-server.pid" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build:check

      - name: Install Playwright Browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Install evidence encoders
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start app server
        run: |
          PORT=3333 pnpm start:next > "$LINEJAM_EVIDENCE_SERVER_LOG" 2>&1 &
          echo $! > "$LINEJAM_EVIDENCE_SERVER_PID"

          for attempt in {1..60}; do
            if curl -sf "$LINEJAM_BASE_URL" >/dev/null; then
              exit 0
            fi

            sleep 2
          done

          cat "$LINEJAM_EVIDENCE_SERVER_LOG"
          exit 1

      - name: Capture QA evidence
        run: pnpm evidence:guest-flow

      - name: Upload QA evidence
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: qa-evidence
          path: ${{ env.LINEJAM_EVIDENCE_DIR }}/
          retention-days: 14

      - name: Upload QA evidence raw test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: qa-evidence-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload QA evidence server log
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: qa-evidence-server-log
          path: ${{ env.LINEJAM_EVIDENCE_SERVER_LOG }}
          retention-days: 14

      - name: Stop app server
        if: always()
        run: |
          if [ -f "$LINEJAM_EVIDENCE_SERVER_PID" ]; then
            kill "$(cat "$LINEJAM_EVIDENCE_SERVER_PID")" || true
          fi

  # Rollup job — branch protection requires this exact name to merge.
  # Job name must match exactly. Workflow name: is a display label only.
  merge-gate:
    name: merge-gate
    runs-on: ubuntu-latest
    needs: [quality-gates, test-build, e2e, qa-evidence]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
