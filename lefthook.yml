# Lefthook configuration for Linejam
# Quality gates by frequency x cost:
#   pre-commit (per commit) : secrets, lint, format on staged files
#   pre-push   (per push)   : typecheck, lint, unit/integration tests -- fast, no Docker
#   merge-gate (per PR)     : full contract incl. build + authenticated browser E2E + osv,
#                             decomposed across parallel runners (.github/workflows/ci.yml)
# The hosted merge-gate is the authoritative contract; pre-push is its fast local subset.
# For full local fidelity on demand, run `pnpm ci:dagger:all`.

pre-commit:
  parallel: true
  commands:
    secrets:
      run: gitleaks protect --staged --redact --no-banner --config .gitleaks.toml
      fail_text: |
        ⚠️  Secret detected in staged files!

        Install gitleaks: brew install gitleaks

        To suppress false positives, add to .gitleaks.toml allowlist section.
        See README.md for details.

    lint:
      glob: "*.{js,ts,jsx,tsx}"
      exclude: "convex/_generated/**"
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true

    format:
      glob: "*.{js,ts,jsx,tsx,json,md,css}"
      exclude: "convex/_generated/**"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm typecheck
    lint:
      run: pnpm lint
    test:
      run: pnpm test

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
