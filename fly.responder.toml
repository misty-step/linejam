app = "linejam-canary-responder"
primary_region = "ord"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile.responder"

[mounts]
  source = "canary_data"
  destination = "/data"

[env]
  LINEJAM_CANARY_RESPONDER_PORT = "8787"
  LINEJAM_CANARY_WEBHOOK_PATH = "/canary/webhook"
  LINEJAM_CANARY_STORE_DIR = "/data/canary"
  LINEJAM_SMOKE_RUNNER = "playwright"
  PLAYWRIGHT_BASE_URL = "https://www.linejam.app"
  PLAYWRIGHT_REQUIRE_AUTH_SMOKE = "1"
  LINEJAM_ENFORCE_SMOKE_URL_ALLOWLIST = "1"
  LINEJAM_ALLOWED_SMOKE_ORIGINS = "https://www.linejam.app"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "2048mb"
